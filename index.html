<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ismaili Scouts Sargodha - Receipt System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --scout-green: #006B3F;
            --scout-gold: #C8AA57;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            max-width: 950px;
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            align-items: center;
        }

        @media (min-width: 768px) {
            .workspace {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* --- Left Side: Control Form --- */
        .form-side {
            display: flex;
            flex-direction: column;
        }

        .form-side h2 {
            color: var(--scout-green);
            margin-bottom: 25px;
            font-size: 24px;
            border-bottom: 3px solid var(--scout-gold);
            padding-bottom: 8px;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--scout-green);
            box-shadow: 0 0 0 3px rgba(0, 107, 63, 0.1);
        }

        .download-btn {
            background-color: var(--scout-green);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(0, 107, 63, 0.2);
        }

        .download-btn:hover {
            background-color: #004d2d;
        }

        .download-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* --- Right Side: Live Receipt Preview --- */
        .preview-side {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .receipt-card {
            width: 360px;
            height: 640px;
            background-color: #F4F4F4;
            border: 12px solid var(--scout-gold);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .receipt-header-bar {
            background-color: var(--scout-green);
            height: 56px;
            width: 100%;
        }

        .receipt-footer-bar {
            background-color: var(--scout-green);
            color: white;
            text-align: center;
            padding: 15px 10px;
            font-size: 12px;
            font-weight: normal;
            letter-spacing: 0.2px;
        }

        .receipt-body {
            flex-grow: 1;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Watermark Layout Container */
        .watermark-overlay {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            pointer-events: none;
            z-index: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .watermark-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.10; 
        }

        .main-title {
            color: var(--scout-green);
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            line-height: 1.1;
            letter-spacing: 0.5px;
            margin-top: 10px;
            z-index: 1;
        }

        .pill-badge {
            background-color: var(--scout-green);
            color: white;
            font-size: 13px;
            font-weight: 700;
            padding: 7px 45px;
            border-radius: 14px;
            margin: 18px 0;
            z-index: 1;
        }

        .message-text {
            color: #000000;
            font-size: 12.5px;
            text-align: center;
            line-height: 1.4;
            margin-bottom: 22px;
            z-index: 1;
        }

        /* Central Form Content Data Box (Fixed Layout) */
        .square-data-box {
            border: 6px solid var(--scout-green);
            width: 280px;
            height: 250px;
            padding: 15px 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            background: rgba(244, 244, 244, 0.85); 
            z-index: 1;
        }

        /* Flex container with custom line margins for neat field layout formatting */
        .input-row {
            display: flex;
            align-items: baseline;
            width: 100%;
            border-bottom: 1.5px solid #000000;
            padding-bottom: 3px;
        }

        .input-row .field-label {
            font-size: 14px;
            font-weight: normal;
            color: #000000;
            white-space: nowrap;
            margin-right: 8px;
        }

        /* Fully working center aligned dynamic inputs values */
        .input-row .field-value {
            font-size: 15px;
            font-weight: bold;
            color: var(--scout-green);
            flex-grow: 1;
            text-align: center;
            padding-right: 15px; /* Balances out the offset from the label on the left side */
        }
    </style>
</head>
<body>

<div class="workspace">
    
    <div class="form-side">
        <h2>Receipt Generator</h2>
        <div class="form-group">
            <label for="input-name">Scout Name</label>
            <input type="text" id="input-name" placeholder="Enter scout's name" value="Shaheer Ali" oninput="updateReceiptPreview()">
        </div>
        <div class="form-group">
            <label for="input-month">Month</label>
            <select id="input-month" onchange="updateReceiptPreview()">
                <option value="January">January</option>
                <option value="February">February</option>
                <option value="March">March</option>
                <option value="April">April</option>
                <option value="May" selected>May</option>
                <option value="June">June</option>
                <option value="July">July</option>
                <option value="August">August</option>
                <option value="September">September</option>
                <option value="October">October</option>
                <option value="November">November</option>
                <option value="December">December</option>
            </select>
        </div>
        <div class="form-group">
            <label for="input-amount">Amount (PKR)</label>
            <input type="text" id="input-amount" placeholder="e.g. 1500" value="1500" oninput="updateReceiptPreview()">
        </div>
        <div class="form-group">
            <label for="input-date">Date Received</label>
            <input type="date" id="input-date" oninput="updateReceiptPreview()">
        </div>
        
        <button class="download-btn" id="save-snapshot-btn">Download PNG Receipt</button>
    </div>

    <div class="preview-side">
        <div class="receipt-card" id="capture-target-card">
            
            <div class="receipt-header-bar"></div>
            
            <div class="receipt-body">
                <div class="watermark-overlay">
                    <img class="watermark-img" src="image.png" alt="Watermark Logo">
                </div>

                <div class="main-title">PAYMENT<br>RECEIVED</div>
                <div class="pill-badge">Thank You!</div>
                
                <div class="message-text">
                    We are pleased to confirm that your<br>monthly scout fund has been received
                </div>
                
                <div class="square-data-box">
                    <div class="input-row">
                        <span class="field-label">Scout Name :</span>
                        <span class="field-value" id="view-name"></span>
                    </div>
                    <div class="input-row">
                        <span class="field-label">Month :</span>
                        <span class="field-value" id="view-month"></span>
                    </div>
                    <div class="input-row">
                        <span class="field-label">Amount :</span>
                        <span class="field-value" id="view-amount"></span>
                    </div>
                    <div class="input-row">
                        <span class="field-label">Date :</span>
                        <span class="field-value" id="view-date"></span>
                    </div>
                </div>
            </div>
            
            <div class="receipt-footer-bar">
                Thank you for being a part of our mission !
            </div>
            
        </div>
    </div>

</div>

<script>
    // Primary Input Selectors
    const inputName = document.getElementById('input-name');
    const inputMonth = document.getElementById('input-month');
    const inputAmount = document.getElementById('input-amount');
    const inputDate = document.getElementById('input-date');

    // Primary Preview Selectors
    const viewName = document.getElementById('view-name');
    const viewMonth = document.getElementById('view-month');
    const viewAmount = document.getElementById('view-amount');
    const viewDate = document.getElementById('view-date');
    const downloadBtn = document.getElementById('save-snapshot-btn');

    // Fallback default setup on window initialize
    const todayDate = new Date();
    inputDate.value = todayDate.toISOString().split('T');

    // Single pipeline function to prevent canvas looping bugs
    function updateReceiptPreview() {
        viewName.textContent = inputName.value.trim() || "";
        viewMonth.textContent = inputMonth.value;
        viewAmount.textContent = inputAmount.value ? `${inputAmount.value} PKR` : "";
        
        const dateVal = inputDate.value;
        if (dateVal) {
            const segments = dateVal.split('-');
            viewDate.textContent = `${segments}-${segments}-${segments}`;
        } else {
            viewDate.textContent = "";
        }
    }

    // Run preview rendering sequence immediately on page display load
    updateReceiptPreview();

    // Canvas Capture Execution Link Channel
    downloadBtn.addEventListener('click', () => {
        const targetCard = document.getElementById('capture-target-card');
        
        downloadBtn.disabled = true;
        downloadBtn.innerText = "Generating File...";
        
        html2canvas(targetCard, {
            scale: 3,           
            useCORS: true,      
            allowTaint: false,
            logging: false
        }).then(canvasInstance => {
            const downloadTrigger = document.createElement('a');
            const fileTitle = inputName.value.trim().replace(/\s+/g, '_') || 'Scout';
            
            downloadTrigger.download = `Ismaili_Scouts_Receipt_${fileTitle}.png`;
            downloadTrigger.href = canvasInstance.toDataURL('image/png');
            downloadTrigger.click();
            
            downloadBtn.disabled = false;
            downloadBtn.innerText = "Download PNG Receipt";
        }).catch(err => {
            console.error(err);
            downloadBtn.disabled = false;
            downloadBtn.innerText = "Download PNG Receipt";
        });
    });
</script>

</body>
</html>
